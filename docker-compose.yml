services:
  # ──────────────────────────────────────────
  # PostgreSQL 15
  # ──────────────────────────────────────────
  barberflow-db:
    image: postgres:15-alpine
    container_name: barberflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - barberflow_pgdata:/var/lib/postgresql/data
      - barberflow_backups:/backups
    networks:
      - barberflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ──────────────────────────────────────────
  # Next.js App (standalone)
  # ──────────────────────────────────────────
  barberflow-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barberflow-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      barberflow-db:
        condition: service_healthy
    networks:
      - barberflow-net
      - n8n_default
    deploy:
      resources:
        limits:
          memory: 512M

  # ──────────────────────────────────────────
  # Caddy (reverse proxy)
  # ──────────────────────────────────────────
  barberflow-caddy:
    image: caddy:2-alpine
    container_name: barberflow-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - barberflow-net
      - n8n_default
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  barberflow_pgdata:
  barberflow_backups:
  caddy_data:
  caddy_config:

networks:
  barberflow-net:
    driver: bridge
  n8n_default:
    external: true

services:
  # ──────────────────────────────────────────
  # PostgreSQL 15
  # ──────────────────────────────────────────
  barberflow-db:
    image: postgres:15-alpine
    container_name: barberflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - barberflow_pgdata:/var/lib/postgresql/data
      - barberflow_backups:/backups
    networks:
      - barberflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ──────────────────────────────────────────
  # Next.js App (standalone) — roteado pelo Traefik do n8n
  # ──────────────────────────────────────────
  barberflow-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barberflow-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      barberflow-db:
        condition: service_healthy
    networks:
      - barberflow-net
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.barberflow.rule=Host(`babia.oxineo.com.br`)"
      - "traefik.http.routers.barberflow.entrypoints=web,websecure"
      - "traefik.http.routers.barberflow.tls=true"
      - "traefik.http.routers.barberflow.tls.certresolver=mytlschallenge"
      - "traefik.http.services.barberflow.loadbalancer.server.port=3000"
      - "traefik.docker.network=n8n_default"
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  barberflow_pgdata:
  barberflow_backups:

networks:
  barberflow-net:
    driver: bridge
  n8n_default:
    external: true

networks:
  n8n_default:
    external: true

services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.2
    container_name: evolution-api
    restart: unless-stopped
    networks:
      - n8n_default
    environment:
      - SERVER_URL=http://evolution-api:8080
      - AUTHENTICATION_API_KEY=${EVO_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${EVO_DB_USER}:${EVO_DB_PASS}@evolution-db:5432/${EVO_DB_NAME}
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - LOG_LEVEL=WARN
    depends_on:
      evolution-db:
        condition: service_healthy

  evolution-db:
    image: postgres:15-alpine
    container_name: evolution-db
    restart: unless-stopped
    networks:
      - n8n_default
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${EVO_DB_USER}
      POSTGRES_PASSWORD: ${EVO_DB_PASS}
      POSTGRES_DB: ${EVO_DB_NAME}
    volumes:
      - evo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EVO_DB_USER} -d ${EVO_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  evo_pgdata:

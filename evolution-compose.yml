services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.2
    container_name: evolution-api
    restart: unless-stopped
    network_mode: host
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=BF_EVO_2026_SECRETKEY
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evo:evo_senha_forte@localhost:5433/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - LOG_LEVEL=WARN
    depends_on:
      evolution-db:
        condition: service_healthy

  evolution-db:
    image: postgres:15-alpine
    container_name: evolution-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: evo
      POSTGRES_PASSWORD: evo_senha_forte
      POSTGRES_DB: evolution
    volumes:
      - evo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evo -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  evo_pgdata:

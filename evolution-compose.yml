services:
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: evolution-api
    restart: unless-stopped
    environment:
      - SERVER_URL=http://evolution-api:8080
      - AUTHENTICATION_API_KEY=BF_EVO_2026_SECRETKEY
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evo:evo_senha_forte@evolution-db:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - LOG_LEVEL=WARN
    networks:
      - evo-net
      - n8n_default
    depends_on:
      evolution-db:
        condition: service_healthy

  evolution-db:
    image: postgres:15-alpine
    container_name: evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: evo
      POSTGRES_PASSWORD: evo_senha_forte
      POSTGRES_DB: evolution
    volumes:
      - evo_pgdata:/var/lib/postgresql/data
    networks:
      - evo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evo -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  evo_pgdata:

networks:
  evo-net:
    driver: bridge
  n8n_default:
    external: true
